# tools/litellm-sandbox/litellm_config.yaml
#
# LiteLLM proxy configuration for the Loom provider sandbox.
#
# All model aliases listed here are EXAMPLES.
# They are only active when the corresponding API key is set in .env.
# Remove or comment out any alias whose provider key you do not have.
#
# Documentation: https://docs.litellm.ai/docs/proxy/configs

general_settings:
  # Master key for the proxy. Used as the Authorization: Bearer <key> value
  # when Loom calls this sandbox. Set LITELLM_MASTER_KEY in .env to override.
  master_key: "sk-loom-sandbox-key-change-me"
  # Drop unsupported params instead of erroring — useful during development.
  drop_params: true

litellm_settings:
  # Suppress streaming thinking content (chain-of-thought) from being forwarded.
  # This mirrors Loom's own raw-thinking privacy rule at the gateway layer.
  success_callback: []
  failure_callback: []

model_list:
  # ── OpenAI ──────────────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: "${OPENAI_API_KEY}"

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: "${OPENAI_API_KEY}"

  # ── Anthropic ────────────────────────────────────────────────────────────────
  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: "${ANTHROPIC_API_KEY}"

  - model_name: claude-3-haiku
    litellm_params:
      model: anthropic/claude-3-haiku-20240307
      api_key: "${ANTHROPIC_API_KEY}"

  # ── Google Gemini ────────────────────────────────────────────────────────────
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: "${GEMINI_API_KEY}"

  - model_name: gemini-1.5-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: "${GEMINI_API_KEY}"

  # ── Ollama pass-through (no key needed) ──────────────────────────────────────
  # Useful for comparing Loom's native Ollama path vs the LiteLLM OpenAI shim.
  - model_name: ollama-qwen
    litellm_params:
      model: ollama/qwen:7b
      api_base: "http://host.docker.internal:11434"
